server.port=9090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users/**,/api/sellers/**,/api/buyers/**,/api/buyer/dashboard,/api/seller/dashboard,/api/internal/users/**

spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://product-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**,/api/categories/**,/api/reviews/**,/api/seller/products/**,/api/seller/categories/**,/api/buyer/products/**,/api/buyer/reviews/**,/uploads/**

spring.cloud.gateway.routes[2].id=cart-service
spring.cloud.gateway.routes[2].uri=lb://cart-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/cart/**,/api/wishlist/**,/api/buyer/wishlist/**,/api/buyer/cart/**

spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=lb://order-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/orders/**,/api/seller/orders/**,/api/buyer/order/**

spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://payment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payments/**,/api/buyer/payment/**

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://notification-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/notifications/**,/api/buyer/notifications/**,/api/notifications/buyer/**

resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.default.permitted-number-of-calls-in-half-open-state=3

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# In-Memory Rate Limiting (Resilience4j) - Low limits for testing
resilience4j.ratelimiter.instances.userService.limit-for-period=10
resilience4j.ratelimiter.instances.userService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.userService.timeout-duration=0s

resilience4j.ratelimiter.instances.productService.limit-for-period=200
resilience4j.ratelimiter.instances.productService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.productService.timeout-duration=0s

resilience4j.ratelimiter.instances.cartService.limit-for-period=15
resilience4j.ratelimiter.instances.cartService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.cartService.timeout-duration=0s

resilience4j.ratelimiter.instances.orderService.limit-for-period=10
resilience4j.ratelimiter.instances.orderService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.orderService.timeout-duration=0s

resilience4j.ratelimiter.instances.paymentService.limit-for-period=5
resilience4j.ratelimiter.instances.paymentService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.paymentService.timeout-duration=0s
